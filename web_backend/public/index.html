<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal Fake News Detector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #333; text-align: center; margin-bottom: 25px; font-size: 28px; }
        label { font-weight: 600; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        textarea { width: 100%; height: 110px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; box-sizing: border-box; font-size: 14px; }
        input[type="file"] { margin-top: 8px; display: block; }
        button { width: 100%; background: #28a745; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 25px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #218838; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: center; }
        .Fake { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .Real { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .verdict-text { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .confidence-text { font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📰 Fake News Detector</h1>
    
    <form id="analysisForm">
        <label for="headline">News Headline / Text</label>
        <textarea id="headline" placeholder="Paste your news headline or article excerpt here (English or Bengali)..."></textarea>
        
        <label for="imageFile">Associated Image (Optional)</label>
        <input type="file" id="imageFile" accept="image/*">
        
        <button type="submit" id="submitBtn">Analyze News Authenticity</button>
    </form>

    <div id="result" class="result-box">
        <div class="verdict-text" id="verdict">Real</div>
        <div class="confidence-text" id="confidence">AI Confidence Model Match: 0%</div>
    </div>
</div>

<script>
    document.getElementById('analysisForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const headline = document.getElementById('headline').value;
        const imageFile = document.getElementById('imageFile').files;
        const submitBtn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('result');
        
        submitBtn.innerText = "Processing Cross-Attention Pass...";
        submitBtn.disabled = true;
        resultBox.style.display = "none";

        const formData = new FormData();
        formData.append('headline', headline);
        if (imageFile) {
            formData.append('image', imageFile);
        }

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (data.error) {
                alert(data.error);
            } else {
                document.getElementById('verdict').innerText = `Verdict: ${data.verdict}`;
                document.getElementById('confidence').innerText = `AI Confidence Model Match: ${data.confidence}%`;
                
                resultBox.className = `result-box ${data.verdict}`;
                resultBox.style.display = "block";
            }
        } catch (error) {
            alert("Error connecting to web service backend pipeline.");
        } finally {
            submitBtn.innerText = "Analyze News Authenticity";
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
